# =====================================================================
# Configuration for the ICIP-XLPSR inference pipeline.
# Loaded by config.py (derived objects such as DEVICE, compiled regexes
# and lookup tables are built there from these values).
# =====================================================================

paths:
  # Relative paths are resolved against the project root (the folder
  # containing src/). Absolute paths are used as-is.
  input_dir: test_input
  output_dir: test_output
  ckpt_dir: models           # place the downloaded checkpoints here
  tpgsr_ckpt: tpgsr_v5_best.pt
  crnn_ckpt: crnn_v5_best.pt
  trocr_subdirs: [light, medium, heavy]

plate:
  characters: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ"
  num_classes: 36
  blank_idx: 36
  regexes:
    1: "^[0-9]{3}[A-Z]{3}[0-9]{2}$"
    2: "^[0-9]{4}[A-Z]{2}[0-9]{2}$"
    3: "^[A-Z]{2}[0-9]{3}[A-Z]{2}$"
  patterns:
    1: DDDLLLDD
    2: DDDDLLDD
    3: LLDDDLL
  lengths:
    1: 8
    2: 8
    3: 7

image:
  lr_h: 16
  lr_w: 40
  hr_h: 32
  hr_w: 80

inference:
  max_target_len: 12
  num_beams: 10
  top_k: 10
  underscore_thresh: 25    # Minimum threshold to avoid underscore (voting)
  invalid_thresh: 30       # Minimum threshold for invalid-type fallback
  ocr1_weight: 0.85
  fill_thresh: 0.4
